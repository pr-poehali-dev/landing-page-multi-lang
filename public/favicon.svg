<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Microphone body -->
  <rect x="22" y="4" width="20" height="30" rx="10" ry="10" stroke="#FF9900" stroke-width="4" fill="none"/>
  <!-- Mic grille lines -->
  <line x1="22" y1="16" x2="42" y2="16" stroke="#FF9900" stroke-width="2.5"/>
  <line x1="22" y1="23" x2="42" y2="23" stroke="#FF9900" stroke-width="2.5"/>
  <!-- Stand arc -->
  <path d="M14 28 Q14 48 32 48 Q50 48 50 28" stroke="#FF9900" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Vertical stand -->
